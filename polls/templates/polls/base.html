{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Sistema{% endblock %}</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap (se já usa no projeto) -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <!-- CSS próprio -->
    <link rel="stylesheet" href="{% static 'polls/css/style.css' %}">

    {% block extra_css %}{% endblock %}
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">

            <a class="navbar-brand" href="{% url 'polls:index' %}">
                Sistema
            </a>

            <button
                class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav"
            >
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">

                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'polls:index' %}">
                            Início
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'polls:tarefa_list' %}">
                            Tarefas
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'polls:analise' %}">
                            Análise
                        </a>
                    </li>

                </ul>
            </div>
        </div>
    </nav>

    <!-- Conteúdo -->
    <main class="container mt-4">

        {% block content %}
        {% endblock %}

    </main>

    <!-- Bootstrap JS -->
    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
    </script>

    {% block extra_js %}{% endblock %}

</body>
</html>
